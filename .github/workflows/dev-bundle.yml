name: Build Cross-Platform Dev Binaries
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build-lsp:
    name: Build LSP for ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tauwriter-lsp-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: tauwriter-lsp-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: tauwriter-lsp-macos-x64

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build LSP Sub-Project
        run: cargo build --release --manifest-path lsp/Cargo.toml --target ${{ matrix.target }}

      - name: Stage Artifact
        run: |
          mkdir -p staged-bin/
          # The binary name in target is 'tauwriter-lsp'
          cp target/${{ matrix.target }}/release/tauwriter-lsp staged-bin/${{ matrix.artifact_name }}

      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: staged-bin/${{ matrix.artifact_name }}

  commit-binaries:
    name: Commit Binaries to Repo
    needs: build-lsp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Bin Directory
        run: mkdir -p extension/bin

      - name: Download All Compiled Binaries
        uses: actions/download-artifact@v4
        with:
          path: extension/bin
          merge-multiple: true

      - name: Commit and Push to Branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add extension/bin/*
          # Only commit if binaries actually changed to avoid infinite loops
          git diff-index --quiet HEAD || git commit -m "chore: automated cross-platform lsp build [skip ci]"
          git push
