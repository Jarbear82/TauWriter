id = "tauwriter"
name = "TauWriter"
version = "0.1.0"
schema_version = 1
authors = ["Jarbear82", "Gemini CLI"]
description = "IDE-style, graph-augmented word processor for novelists and worldbuilders."
repository = "https://github.com/Jarbear82/TauWriter"

languages = ["languages/hubgs", "languages/twxml"]

[grammars.hubgs]
repository = "https://github.com/Jarbear82/TauWriter"
rev = "868a0dea45e1c1bea10e20b366814a1c599a7502"
path = "extension/languages/hubgs"

[grammars.twxml]
repository = "https://github.com/Jarbear82/TauWriter"
rev = "868a0dea45e1c1bea10e20b366814a1c599a7502"
path = "extension/languages/twxml"

[language_servers.tauwriter-lsp]
name = "TauWriter Language Server"
languages = ["HubGS", "TWXML"]
command = "tauwriter-lsp"
